<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Renjana 🤍</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #ffd6e0, #ffeef5);
    overflow: hidden;
}

/* Card */
.card {
    background: white;
    max-width: 700px;
    margin: 60px auto;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    text-align: center;
    z-index: 2;
    position: relative;
}

h1 {
    color: #ff4f81;
}

.name {
    color: #ff6b9a;
    margin-bottom: 15px;
    font-weight: bold;
}

/* Typing text */
#typing {
    font-size: 15px;
    line-height: 1.6;
    color: #444;
    min-height: 120px;
}

/* Buttons */
button {
    margin: 10px;
    padding: 10px 18px;
    border: none;
    border-radius: 20px;
    background: #ff6b9a;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff4f81;
}

/* Hidden message */
#extra {
    margin-top: 15px;
    opacity: 0;
    transition: 0.5s;
    color: #ff4f81;
    font-weight: bold;
}

/* Hearts */
.heart {
    position: absolute;
    bottom: -20px;
    width: 15px;
    height: 15px;
    background: #ff6b9a;
    transform: rotate(45deg);
    animation: float 6s infinite ease-in;
}

.heart::before,
.heart::after {
    content: "";
    position: absolute;
    width: 15px;
    height: 15px;
    background: #ff6b9a;
    border-radius: 50%;
}

.heart::before { top: -8px; left: 0; }
.heart::after { left: -8px; top: 0; }

@keyframes float {
    0% { transform: translateY(0) rotate(45deg); opacity: 1; }
    100% { transform: translateY(-800px) rotate(45deg); opacity: 0; }
}
</style>
</head>

<body>

<!-- Music (soft autoplay, may require user interaction on some devices) -->
<audio id="bgm" loop>
    <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9bce3b.mp3" type="audio/mpeg">
</audio>

<div class="card">
    <h1>Good Morning</h1>
    <div class="name">renjana (nur alya salsabila)</div>

    <div id="typing"></div>

    <button onclick="playMusic()">play music 🎶</button>
    <button onclick="showExtra()">tap if you're nervous 🤍</button>

    <div id="extra">hey... breathe. you’re stronger than this moment. i believe in you.</div>
</div>

<script>
// typing effect
const text = `I know today feels a little scary because of your motorcycle license, 
but being nervous just means you care. You've worked hard to get here, and that already proves how strong you are.

Take everything one step at a time. Trust yourself, even if your thoughts feel loud. 
You don’t need to be perfect—you just need to try.

No matter what happens, I’m already proud of you. I’ll be thinking of you the whole time.

You’ve got this, renjana. Always.`;

let i = 0;
function typeWriter() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 30);
    }
}
typeWriter();

// play music
function playMusic() {
    document.getElementById("bgm").play();
}

// extra message
function showExtra() {
    document.getElementById("extra").style.opacity = "1";
}

// hearts
for (let i = 0; i < 25; i++) {
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (4 + Math.random() * 3) + "s";
    document.body.appendChild(heart);
}
</script>

</body>
</html>
